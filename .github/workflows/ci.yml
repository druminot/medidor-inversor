name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ruff
        run: pip install ruff==0.15.18

      - name: Install pytest
        run: pip install pytest==8.4.2

      - name: Lint with ruff
        working-directory: Proyecto
        run: |
          ruff check siser-reader/siser_reader.py \
                    grafana/update_timerange.py \
                    inverter-simulator/simulator.py \
                    tests/

      - name: Run tests
        working-directory: Proyecto
        run: pytest tests/ -v

  docker-build:
    name: Docker Build (siser-reader + timerange-updater)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build siser-reader image
        run: docker build -t solar-monitor-siser-reader:test Proyecto/siser-reader/

      - name: Build timerange-updater image
        run: docker build -t solar-monitor-timerange-updater:test Proyecto/grafana/

      - name: Build inverter-simulator image
        run: docker build -t solar-monitor-inverter-simulator:test Proyecto/inverter-simulator/
