services:
  modbus-reader:
    build: ./modbus-reader
    devices:
      - /dev/inverter-serial:/dev/inverter-serial
    device_cgroup_rules:
      - 'c 188:* rwm'
    group_add:
      - dialout
    restart: unless-stopped
    environment:
      - SERIAL_PORT=/dev/inverter-serial
      - SLAVE_ADDRESS=1
      - BAUDRATE=9600
      - PARITY=N
      - STOPBITS=1
      - BYTESIZE=8
      - POLL_REALTIME=5
      - POLL_FAST=60
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_NAME=solar_monitor
      - DB_USER=solar
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "cat /tmp/modbus-reader-health.json | grep -q '\"status\"'"]
      interval: 30s
      timeout: 10s
      retries: 3

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    volumes:
      - ts_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/init-users.sh:/docker-entrypoint-initdb.d/02-users.sh
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=solar_monitor
      - POSTGRES_USER=solar
      - GRAFANA_READER_PASSWORD=${GRAFANA_READER_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://lautuaro.tail6e64d5.ts.net
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GRAFANA_READER_PASSWORD=${GRAFANA_READER_PASSWORD}

  inverter-simulator:
    build: ./inverter-simulator
    container_name: inverter-simulator
    restart: unless-stopped
    ports:
      - "5502:5502"
      - "5503:5503"
      - "33000:33000/udp"
    environment:
      - SIMULATOR_MODE=modbus

  sunvision-wine:
    build: ./sunvision-wine
    container_name: sunvision-wine
    restart: unless-stopped
    depends_on:
      - inverter-simulator
    ports:
      - "0.0.0.0:8007:8006"

volumes:
  ts_data:
  grafana_data: