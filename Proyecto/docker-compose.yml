services:
  siser-reader:
    build: ./siser-reader
    devices:
      - /dev/inverter-serial:/dev/inverter-serial
    device_cgroup_rules:
      - 'c 188:* rwm'
    group_add:
      - dialout
    restart: always
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - SERIAL_PORT=/dev/inverter-serial
      - INVERTER_ADDR=33
      - BAUDRATE=9600
      - POLL_INTERVAL=5
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_NAME=solar_monitor
      - DB_USER=solar
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f siser_reader.py > /dev/null && [ -e /tmp/siser_state.json ]"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    volumes:
      - ts_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/init-users.sh:/docker-entrypoint-initdb.d/02-users.sh
      - ./db/sunrise_functions.sql:/docker-entrypoint-initdb.d/03-sunrise.sql
    restart: always
    mem_limit: 1g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=solar_monitor
      - POSTGRES_USER=solar
      - GRAFANA_READER_PASSWORD=${GRAFANA_READER_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar -d solar_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  timerange-updater:
    build: ./grafana
    restart: always
    mem_limit: 128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./grafana/dashboards:/dashboards
    environment:
      - DASHBOARD_PATH=/dashboards/realtime.json
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_NAME=solar_monitor
      - DB_USER=solar
      - DB_PASSWORD=${DB_PASSWORD}
      - CHECK_INTERVAL=60
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import os; exit(0 if os.path.exists(os.environ.get('DASHBOARD_PATH','/dashboards/realtime.json')) else 1)\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
    restart: always
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DEFAULT_THEME=light
      - GF_DEFAULT_APP_MODE=production
      - GRAFANA_READER_PASSWORD=${GRAFANA_READER_PASSWORD}

volumes:
  ts_data:
  grafana_data: