services:
  siser-reader:
    build: ./siser-reader
    devices:
      - /dev/inverter-serial:/dev/inverter-serial
    device_cgroup_rules:
      - 'c 188:* rwm'
    group_add:
      - dialout
    restart: always
    environment:
      - SERIAL_PORT=/dev/inverter-serial
      - INVERTER_ADDR=33
      - BAUDRATE=9600
      - POLL_INTERVAL=5
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_NAME=solar_monitor
      - DB_USER=solar
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      timescaledb:
        condition: service_healthy

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    volumes:
      - ts_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/init-users.sh:/docker-entrypoint-initdb.d/02-users.sh
    restart: always
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=solar_monitor
      - POSTGRES_USER=solar
      - GRAFANA_READER_PASSWORD=${GRAFANA_READER_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar"]
      interval: 10s
      timeout: 5s
      retries: 5

  timerange-updater:
    build: ./grafana
    restart: always
    depends_on:
      - timescaledb
    volumes:
      - ./grafana/dashboards:/dashboards
    environment:
      - DASHBOARD_PATH=/dashboards/realtime.json
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_NAME=solar_monitor
      - DB_USER=solar
      - DB_PASSWORD=${DB_PASSWORD}
      - UPDATE_INTERVAL=300

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
    restart: always
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DEFAULT_THEME=light
      - GF_DEFAULT_APP_MODE=production
      - GRAFANA_READER_PASSWORD=${GRAFANA_READER_PASSWORD}

volumes:
  ts_data:
  grafana_data: