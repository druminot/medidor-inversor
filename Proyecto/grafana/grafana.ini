[server]
root_url = http://localhost:3000

[security]
cookie_secure = false
cookie_samesite = lax

[auth]
disable_login_form = false

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[users]
allow_sign_up = false

[log]
mode = console
level = info

[theme]
default_theme = light

[paths]
provisioning = /etc/grafana/provisioning